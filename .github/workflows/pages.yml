# Build the marketing landing (Next.js static export in site/) and deploy it to GitHub Pages.
# The site serves at https://re-marked.github.io/handshake (basePath /handshake, set in
# site/next.config.mjs). Requires Pages to be enabled with "Source: GitHub Actions" once.
name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; let an in-progress run finish so a half-built site is never published.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version from the root package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: site
      - name: Build (static export)
        run: pnpm build
        working-directory: site
      - name: Disable Jekyll (so _next/ assets are served)
        run: touch site/out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
