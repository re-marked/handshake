# Build the marketing landing (Next.js static export in site/) and deploy it to GitHub Pages.
# The site serves at https://re-marked.github.io/handshake (basePath /handshake, set in
# site/next.config.mjs). Requires Pages to be enabled with "Source: GitHub Actions" once.
name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  # Publishing an app release rebuilds the site, so /changelog and /feed.xml (both generated
  # from the GitHub releases API at build time) pick the new release up automatically.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; let an in-progress run finish so a half-built site is never published.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version from the root package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: site
      - name: Build (static export)
        run: pnpm build
        working-directory: site
      - name: Disable Jekyll (so _next/ assets are served)
        run: touch site/out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      # Tell IndexNow-capable engines (Bing → Copilot/ChatGPT browsing) that our URLs changed, so
      # re-crawls happen in minutes instead of weeks. The key file lives in site/public/; the
      # keyLocation under /handshake/ scopes the key to exactly our URLs. Best-effort — never
      # fails the deploy.
      - name: Ping IndexNow
        continue-on-error: true
        run: |
          sleep 20 # let the CDN start serving the fresh sitemap + key file
          urls=$(curl -s https://re-marked.github.io/handshake/sitemap.xml | grep -oP '(?<=<loc>)[^<]+')
          [ -z "$urls" ] && { echo "no sitemap URLs — skipping"; exit 0; }
          json=$(printf '%s\n' $urls | jq -R . | jq -s '{
            host: "re-marked.github.io",
            key: "31cce94983b7ae642fe7dc12b476cc78",
            keyLocation: "https://re-marked.github.io/handshake/31cce94983b7ae642fe7dc12b476cc78.txt",
            urlList: .
          }')
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$json" -o /dev/null -w "IndexNow HTTP %{http_code} for $(echo "$urls" | wc -l) URLs\n"
